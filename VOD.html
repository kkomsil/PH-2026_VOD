<title>PH Korea 2026 — VOD 녹화·사용 동의 / Consent for VOD Recording & Use</title>
<style>
  :root{ --navy:#1f3a5f; --blue:#2b6cb0; --line:#e2e8f0; --ok:#2f855a; --no:#c53030; --bg:#f4f6f9; --text:#1a202c; --muted:#5a6b7b; }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;}
  .wrap{max-width:760px;margin:0 auto;padding:24px 16px 80px;}
  header{background:var(--navy);color:#fff;border-radius:14px;padding:24px 22px;margin-bottom:18px;}
  header h1{margin:0 0 6px;font-size:20px;letter-spacing:.2px;}
  header .sub{font-size:13.5px;opacity:.92;}
  header .meta{margin-top:12px;font-size:12.5px;opacity:.85;border-top:1px solid rgba(255,255,255,.2);padding-top:10px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 18px;margin-bottom:16px;}
  .who{display:flex;flex-wrap:wrap;gap:4px 14px;align-items:baseline;margin-bottom:4px;}
  .who .name{font-size:18px;font-weight:700;color:var(--navy);}
  .who .aff{font-size:13.5px;color:var(--muted);}
  .intro{font-size:13.5px;color:var(--muted);background:#eef3f9;border-radius:10px;padding:12px 14px;margin-bottom:16px;}
  .intro b{color:var(--navy);}
  .lec{border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
  .lec .code{display:inline-block;background:var(--navy);color:#fff;font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:8px;}
  .lec .ses{font-size:12.5px;color:var(--muted);margin-bottom:2px;}
  .lec .ttl{font-size:15px;font-weight:600;margin-bottom:4px;}
  .lec .when{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .q{font-size:13.5px;font-weight:600;margin-bottom:8px;}
  .opts{display:flex;flex-wrap:wrap;gap:8px;}
  .opt{flex:1 1 200px;min-width:180px;}
  .opt input{position:absolute;opacity:0;}
  .opt label{display:block;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;cursor:pointer;font-size:13.5px;transition:.12s;}
  .opt label:hover{border-color:var(--blue);}
  .opt input:checked + label{border-color:var(--blue);background:#eaf2fb;font-weight:600;}
  .opt.agree input:checked + label{border-color:var(--ok);background:#e9f6ee;color:var(--ok);}
  .opt.disagree input:checked + label{border-color:var(--no);background:#fdecec;color:var(--no);}
  .field{margin:10px 0 0;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;}
  .field input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;}
  .actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(244,246,249,0),var(--bg) 30%);padding:16px 0 4px;}
  .btn{display:block;width:100%;border:0;border-radius:11px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;}
  .btn[disabled]{opacity:.55;cursor:default;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#235a96;}
  .btn-second{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600;font-size:13.5px;padding:12px;}
  .fallback{display:none;}
  .toggle{display:block;text-align:center;font-size:12.5px;color:var(--blue);cursor:pointer;margin:2px 0 10px;text-decoration:underline;}
  .note{font-size:12px;color:var(--muted);text-align:center;}
  .err{display:none;background:#fdecec;color:var(--no);border:1px solid #f5b5b5;border-radius:9px;padding:10px 12px;font-size:13px;margin-bottom:12px;}
  .done{display:none;background:#e9f6ee;border:1px solid #a8d8ba;border-radius:11px;padding:16px;margin-bottom:14px;font-size:13.5px;color:#22543d;}
  .done b{display:block;font-size:15px;margin-bottom:6px;}
  .invalid{background:#fff;border:1px solid var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted);}
  pre.summary{white-space:pre-wrap;word-break:break-word;background:#f7f9fb;border:1px solid var(--line);border-radius:9px;padding:12px;font-size:12px;margin-top:10px;display:none;}
</style>

function getParam(){

}

/* ---- 데이터 수집·검증 ---- */
function getData(){
  var err = document.getElementById('err');
  var items = [];
  for(var i=0;i<sp.lectures.length;i++){
    var n=i+1;
    var sel = document.querySelector('input[name="c'+n+'"]:checked');
    if(!sel){
      err.textContent = '강의 ' + n + '의 동의 여부를 선택해 주세요. / Please answer for Lecture ' + n + '.';
      err.style.display='block';
      window.scrollTo({top:0,behavior:'smooth'});
      return null;
    }
    var l=sp.lectures[i];
    items.push({code:l.code, session:l.session, title:l.title, consent:sel.value});
  }
  err.style.display='none';
  return { email: '', items: items };
}
function buildText(d){
  var L=[];
  L.push('[PH Korea 2026 — 발표 VOD 녹화·사용 동의 / Consent for VOD Recording & Use]');
  L.push('성함 Name: ' + sp.name);
  L.push('소속 Affiliation: ' + (sp.aff||''));
  L.push('국가 Country: ' + (sp.country||''));
  L.push('제출 시각 Submitted: ' + new Date().toLocaleString());
  L.push('');
  d.items.forEach(function(it,i){
    L.push('▣ 강의 ' + (i+1) + ' / Lecture ' + (i+1));
    L.push('  - 코드 Code: ' + it.code);
    L.push('  - 세션 Session: ' + it.session);
    L.push('  - 제목 Title: ' + it.title);
    L.push('  - VOD 동의 Consent: ' + it.consent);
    L.push('');
  });
  return L.join('\n');
}

/* ---- 직접 제출 (JSONP → 구글시트) ---- */
function submitDirect(){
  if(submitted) return;
  var d = getData(); if(d===null) return;
  var btn=document.getElementById('btnSubmit');
  btn.disabled=true; btn.textContent='제출 중… / Submitting…';
  var payload = { id:sp.id, name:sp.name, aff:sp.aff, country:sp.country, email:d.email, lectures:d.items };
  var cbName = 'cb_' + Date.now();
  var s=document.createElement('script');
  var done=false;
  function cleanup(){ try{ delete window[cbName]; }catch(e){ window[cbName]=undefined; } if(s&&s.parentNode) s.parentNode.removeChild(s); }
  window[cbName] = function(res){ done=true; cleanup();
    if(res && res.ok){ onSuccess(); } else { onFail(); } };
  s.onerror = function(){ if(!done){ cleanup(); onFail(); } };
  var url = SUBMIT_URL + (SUBMIT_URL.indexOf('?')>-1?'&':'?') + 'callback=' + cbName + '&data=' + encodeURIComponent(JSON.stringify(payload));
  s.src = url;
  document.body.appendChild(s);
  setTimeout(function(){ if(!done){ cleanup(); onFail(); } }, 9000);

  function onSuccess(){
    submitted=true;
    app.innerHTML = '<div class="card" style="text-align:center;padding:44px 24px">'
      + '<div style="font-size:44px;line-height:1;margin-bottom:10px">✅</div>'
      + '<h2 style="color:var(--navy);margin:0 0 10px;font-size:20px">제출 완료 / Submitted</h2>'
      + '<p style="color:var(--muted);font-size:14px;margin:0">소중한 답변 감사합니다. 동의 내용이 정상적으로 접수되었습니다.<br>'
      + 'Thank you. Your consent has been successfully recorded.</p></div>';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function onFail(){
    btn.disabled=false; btn.textContent='제출하기 / Submit';
    var err=document.getElementById('err');
    err.innerHTML='제출 중 문제가 발생했습니다. 아래 ‘이메일·복사로 보내기’로 회신해 주세요.<br>Submission failed — please use email/copy below instead.';
    err.style.display='block';
    document.getElementById('fb').style.display='block';
    window.scrollTo({top:document.getElementById('err').offsetTop-80,behavior:'smooth'});
  }
}
function lockForm(){
  var f=document.getElementById('frm');
  f.querySelectorAll('input,button').forEach(function(el){ el.disabled=true; });
}

  var d=getData(); if(d===null) return;

  window.location.href='mailto:'+RECV_EMAIL+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(text);
  showDone('<b>거의 끝났어요 / Almost done</b>메일 앱에서 ‘보내기’를 눌러 제출을 완료해 주세요. / Please press ‘Send’ in your mail app.');
}
function copyResult(){
  var d=getData(); if(d===null) return;
  var text=buildText(d);
  var box=document.getElementById('sumBox'); box.textContent=text; box.style.display='block';
  var ok=function(){ showDone('<b>결과가 복사되었습니다 / Copied</b>사무국 이메일('+RECV_EMAIL+')에 붙여넣어 보내 주세요. / Please paste it into an email to the secretariat.'); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok, function(){ selectBox(box); ok(); });
  } else { selectBox(box); try{document.execCommand('copy');}catch(e){} ok(); }
}
function selectBox(box){ var r=document.createRange(); r.selectNodeContents(box); var s=getSelection(); s.removeAllRanges(); s.addRange(r); }
function showDone(html){
  var dn=document.getElementById('done'); dn.innerHTML=html; dn.style.display='block';
  window.scrollTo({top:dn.offsetTop-80,behavior:'smooth'});
}

showById(getParam());
</script>
